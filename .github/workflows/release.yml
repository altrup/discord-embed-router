name: Release

on:
  push:
    tags:
      - v*

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC) and provenance
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the tagged commit can be checked against main
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} points at a commit not on main" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${pkg_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${pkg_version}" >&2
            exit 1
          fi

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx publint

      - run: npm publish --provenance --access public
